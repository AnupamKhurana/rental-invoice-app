{% extends "base.html" %}

{% block title %}Register - Indian Rental Invoicing App{% endblock %}

{% block content %}
<div class="auth-container" style="max-width: 500px;">
    <h2>📝 Landlord Registration</h2>
    
    <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
            <label for="name">Full Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number <span class="required">*</span></label>
            <input type="tel" id="phone" name="phone" class="form-control" placeholder="10-digit mobile number" required>
        </div>
        
        <div class="form-group">
            <label for="address">Address <span class="required">*</span></label>
            <textarea id="address" name="address" class="form-control" required></textarea>
        </div>
        
        <div class="form-group">
            <label for="pan">PAN Number <span class="required">*</span></label>
            <input type="text" id="pan" name="pan" class="form-control" 
                   placeholder="ABCDE1234F" 
                   maxlength="10" 
                   style="text-transform: uppercase;"
                   required>
            <small style="color: #666;">Format: 5 letters + 4 digits + 1 letter</small>
        </div>
        
        <div class="form-group">
            <label for="gstin">GSTIN (Optional)</label>
            <input type="text" id="gstin" name="gstin" class="form-control" 
                   placeholder="22ABCDE1234F1Z5"
                   maxlength="15"
                   style="text-transform: uppercase;">
            <small style="color: #666;">Required if GST registered</small>
        </div>
        
        <div class="form-group">
            <label for="password">Password <span class="required">*</span></label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirm Password <span class="required">*</span></label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
    
    <div class="auth-links">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
    </div>
</div>
{% endblock %}
